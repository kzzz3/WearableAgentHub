[project]
name = "wearable-core"
version = "0.1.0"
description = "WearableAgent Hub - Agent core engine"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "openai>=1.60",
    "pydantic>=2.10",
    "pyyaml>=6.0",
    "websockets>=14.0",
    "httpx>=0.28",
    "aiosqlite>=0.20",
    "python-dotenv>=1.0",
    "a2a-sdk>=1.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.8",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]